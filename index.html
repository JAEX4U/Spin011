<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SPIN Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="https://i.ibb.co/LdTF1vs0/image.png">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav>
  <!-- 🔝 LOGO -->
  <div class="top-logo">
    <img src="https://i.ibb.co/LdTF1vs0/image.png" alt="logo">
  </div>

  <h2>SPIN Store</h2>

  <!-- ⋮ MENU -->
  <div class="menu-icon" onclick="toggleMenu()">⋮</div>

  <!-- DROPDOWN -->
  <div id="dropdownMenu" class="dropdown-menu">
   
    <!-- 🕒 LIVE CLOCK -->
    <div class="menu-clock" id="menuClock">00:00:00</div>
   
    <div onclick="goPage('index.html')">Home</div>
    <div onclick="goPage('tool.html')">Tools</div>
    <div onclick="goPage('rule.html')">Rules</div>
    <div onclick="goPage('telegram.html')">Contact</div>
  </div>
</nav>

<!-- HEADER -->
<header>
  <h1>SPIN 011 Cards</h1>
</header>

<!-- CATEGORY -->
<div class="category-buttons">
  <button onclick="filterCategory('D')">D Cards</button>
  <button onclick="filterCategory('C')">C Cards</button>
  <button onclick="filterCategory('NFC')">NFC Cards</button>
  <button onclick="filterCategory('OTP')">011 Cards</button>
</div>

<!-- PRODUCTS -->
<div class="container" id="products"></div>

<!-- VHS EFFECT -->
<div class="vhs-line"></div>

<!-- FOOTER -->
<footer>© 2026 Store</footer>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <h2>Welcome 👋</h2>
    <p>Welcome to SPIN Store!</p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
